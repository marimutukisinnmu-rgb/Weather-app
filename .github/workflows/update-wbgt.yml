name: Update WBGT

on:
  schedule:
    # 毎時00分 (UTC)
    - cron: "0 * * * *"

  # 手動実行
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wbgt-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create docs folder
        run: mkdir -p docs

      - name: Download WBGT
        run: |
          curl -L \
            -A "Mozilla/5.0" \
            "https://www.wbgt.env.go.jp/js/top_tooltip_td.js" \
            -o docs/top_tooltip_td.js

      - name: Append update timestamp
        run: |
          echo "" >> docs/top_tooltip_td.js
          echo "// Updated by GitHub Actions: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S JST')" >> docs/top_tooltip_td.js

      - name: Check file
        run: |
          ls -lh docs
          tail -5 docs/top_tooltip_td.js

      - name: Commit and Push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/top_tooltip_td.js

          # 更新日時が毎回変わる前提なので毎回コミット
          git commit -m "Update WBGT"

          # pushに失敗したら最新を取り込んで再試行
          for i in 1 2 3; do
            echo "=== Push attempt $i ==="

            if git push origin main; then
              echo "Push成功！"
              exit 0
            fi

            echo "Push失敗。最新を取得してリベースします..."
            git pull --rebase origin main

            sleep 2
          done

          echo "3回試しましたがPushできませんでした。"
          exit 1

# 最後に更新日時をコメントとして追記する理由
# ダウンロード前に日時を書くと、取得開始時刻になってしまう。
# ダウンロード完了後に追記することで、
# 「公開される top_tooltip_td.js が完成した時刻」を記録できる。
# JavaScriptのコメントなので動作には影響しない。
